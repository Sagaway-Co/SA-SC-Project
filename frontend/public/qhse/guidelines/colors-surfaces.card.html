<!-- @dsCard group="Colors" viewport="700x190" name="Canvas & Surfaces" subtitle="Layered dark surfaces from base to overlay" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:24px;display:flex;gap:14px;flex-wrap:wrap;}
  .sw{width:148px;}
  .chip{height:64px;border-radius:var(--radius-lg);border:1px solid var(--border-default);}
  .name{font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--text-secondary);}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--bg-base)"></div><div class="name">--bg-base</div><div class="val">#08090A</div></div>
  <div class="sw"><div class="chip" style="background:var(--bg-raised)"></div><div class="name">--bg-raised</div><div class="val">#0D0E11</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-1)"></div><div class="name">--surface-1</div><div class="val">#121317</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="name">--surface-2</div><div class="val">#181A1F</div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-3)"></div><div class="name">--surface-3</div><div class="val">#20232A</div></div>
</div></body></html>
