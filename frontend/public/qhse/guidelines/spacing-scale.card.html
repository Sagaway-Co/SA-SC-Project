<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:28px;display:flex;align-items:flex-end;gap:16px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{width:24px;background:var(--gradient-accent);border-radius:var(--radius-xs);}
  .m{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);}
</style></head>
<body><div class="wrap">
  <div class="col"><div class="bar" style="height:8px"></div><div class="m">2 · 8</div></div>
  <div class="col"><div class="bar" style="height:16px"></div><div class="m">4 · 16</div></div>
  <div class="col"><div class="bar" style="height:24px"></div><div class="m">6 · 24</div></div>
  <div class="col"><div class="bar" style="height:32px"></div><div class="m">8 · 32</div></div>
  <div class="col"><div class="bar" style="height:48px"></div><div class="m">12 · 48</div></div>
  <div class="col"><div class="bar" style="height:64px"></div><div class="m">16 · 64</div></div>
  <div class="col"><div class="bar" style="height:80px"></div><div class="m">20 · 80</div></div>
</div></body></html>
