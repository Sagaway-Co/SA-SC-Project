<!-- @dsCard group="Colors" viewport="700x170" name="Hazard Grade Ramp" subtitle="GB 6441 incident grading I–IV" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:24px;display:flex;gap:14px;flex-wrap:wrap;}
  .sw{width:150px;}
  .chip{height:60px;border-radius:var(--radius-lg);display:flex;align-items:flex-end;padding:10px;font-weight:600;color:#0B0C0E;}
  .name{font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--text-secondary);}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--grade-1)">I 级 · 特别重大</div><div class="name">--grade-1</div></div>
  <div class="sw"><div class="chip" style="background:var(--grade-2)">II 级 · 重大</div><div class="name">--grade-2</div></div>
  <div class="sw"><div class="chip" style="background:var(--grade-3)">III 级 · 较大</div><div class="name">--grade-3</div></div>
  <div class="sw"><div class="chip" style="background:var(--grade-4)">IV 级 · 一般</div><div class="name">--grade-4</div></div>
</div></body></html>
