<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:24px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;}
  .sw{width:120px;}
  .chip{height:64px;border-radius:var(--radius-lg);border:1px solid var(--border-subtle);}
  .name{font-family:var(--font-mono);font-size:11px;margin-top:8px;color:var(--text-secondary);}
  .val{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--accent)"></div><div class="name">--accent</div><div class="val">#C6F24E</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-hover)"></div><div class="name">--accent-hover</div><div class="val">#D4FB67</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-press)"></div><div class="name">--accent-press</div><div class="val">#B3E03C</div></div>
  <div class="sw"><div class="chip" style="background:var(--gradient-accent)"></div><div class="name">--gradient-accent</div><div class="val">CTA fill</div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-soft)"></div><div class="name">--accent-soft</div><div class="val">14% tint</div></div>
</div></body></html>
