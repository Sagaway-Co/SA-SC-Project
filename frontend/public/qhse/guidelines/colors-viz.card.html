<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:26px;display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .sw{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .dot{width:64px;height:64px;border-radius:var(--radius-md);}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
</style></head>
<body><div class="wrap">
  <div class="sw"><div class="dot" style="background:var(--viz-1)"></div><div class="name">viz-1</div></div>
  <div class="sw"><div class="dot" style="background:var(--viz-2)"></div><div class="name">viz-2</div></div>
  <div class="sw"><div class="dot" style="background:var(--viz-3)"></div><div class="name">viz-3</div></div>
  <div class="sw"><div class="dot" style="background:var(--viz-4)"></div><div class="name">viz-4</div></div>
  <div class="sw"><div class="dot" style="background:var(--viz-5)"></div><div class="name">viz-5</div></div>
  <div class="sw"><div class="dot" style="background:var(--viz-6)"></div><div class="name">viz-6</div></div>
</div></body></html>
