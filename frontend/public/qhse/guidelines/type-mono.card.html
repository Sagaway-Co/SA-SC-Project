<!-- @dsCard group="Type" viewport="700x180" name="Mono — Eyebrows & Data" subtitle="Geist Mono: labels, metadata, numerics" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:28px;display:flex;flex-direction:column;gap:16px;}
  .eb{font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:var(--tracking-eyebrow);color:var(--accent-text);display:flex;align-items:center;gap:8px;}
  .tick{width:14px;height:1.5px;background:var(--accent);box-shadow:0 0 8px var(--accent);}
  .num{font-family:var(--font-mono);font-size:28px;font-weight:500;font-variant-numeric:tabular-nums;}
  .m{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
</style></head>
<body><div class="wrap">
  <div class="eb"><span class="tick"></span>核心能力 / CAPABILITIES</div>
  <div class="num">99.97% &nbsp; <span style="color:var(--accent-text)">SHA-256</span> &nbsp; 12,480</div>
  <div class="m">Geist Mono · uppercase · +0.14em tracking · tabular-nums</div>
</div></body></html>
