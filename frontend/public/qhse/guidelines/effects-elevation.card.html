<!-- @dsCard group="Spacing" viewport="700x210" name="Elevation & Glow" subtitle="Shadows + the signature accent glow" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
  html,body{margin:0;background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);}
  .wrap{padding:34px 26px;display:flex;gap:26px;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .box{width:120px;height:74px;background:var(--surface-1);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);}
  .m{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);}
</style></head>
<body><div class="wrap">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="m">shadow-sm</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="m">shadow-md</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="m">shadow-lg</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--highlight-top),var(--glow-accent-soft);border-color:var(--border-accent)"></div><div class="m">glow-accent</div></div>
</div></body></html>
