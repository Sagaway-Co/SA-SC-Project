# Enterprise portal — separate virtual host
server {
  listen 80;
  server_name enterprise.sagaway.cn;

  location / {
    root /usr/share/nginx/html;
    try_files /enterprise.html =404;
  }
}

# Default server: XRD Plotter SPA + /lab static page
server {
  listen 80 default_server;

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 50m;
  }

  location = /lab {
    root /usr/share/nginx/html;
    try_files /lab.html =404;
  }

  location = /lab.html {
    root /usr/share/nginx/html;
  }

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
