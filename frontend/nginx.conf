# Enterprise portal — virtual host for enterprise.sagaway.cn
server {
  listen 80;
  server_name enterprise.sagaway.cn;

  root /usr/share/nginx/html;

  # /qhse → QHSE product marketing site
  location /qhse/ {
    try_files $uri $uri/ /qhse/index.html;
  }
  location = /qhse {
    return 301 /qhse/;
  }

  # /lab → Sagaway Lab static page
  location = /lab {
    try_files /lab.html =404;
  }
  location = /lab.html {
    # served from root
  }

  # Enterprise portal homepage
  location / {
    try_files /enterprise.html =404;
  }
}

# Default server: XRD Plotter SPA (10.1.2.22 default)
server {
  listen 80 default_server;

  root /usr/share/nginx/html;

  location /api/ {
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 50m;
  }

  location = /lab {
    try_files /lab.html =404;
  }
  location = /lab.html {
    # served
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
